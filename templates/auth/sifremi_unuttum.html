{% extends 'base.html' %}
{% block baslik %}Şifremi Unuttum{% endblock %}
{% block icerik %}

<div class="row justify-content-center mt-5">
    <div class="col-md-5">
        <div class="text-center mb-4">
            <i class="bi bi-key-fill text-danger" style="font-size: 3rem;"></i>
            <h3 class="mt-2 fw-bold">Şifremi Unuttum</h3>
            <p class="text-muted">
                Kayıtlı telefon numaranızı girin,
                yeni şifrenizi belirleyin.
            </p>
        </div>

        <div class="card shadow">
            <div class="card-body p-4">
                <form method="POST" action="{{ url_for('auth.sifremi_unuttum') }}">

                    <div class="mb-3">
                        <label class="form-label">
                            <i class="bi bi-telephone"></i> Telefon Numaranız
                        </label>
                        <input type="tel" class="form-control form-control-lg"
                               name="telefon" placeholder="05XXXXXXXXX"
                               required autofocus>
                        <div class="form-text">
                            Kayıt sırasında kullandığınız telefon numarası
                        </div>
                    </div>

                    <div class="mb-3">
                        <label class="form-label">
                            <i class="bi bi-lock"></i> Yeni Şifre
                        </label>
                        <input type="password" class="form-control form-control-lg"
                               name="yeni_sifre" minlength="6" required>
                        <div class="form-text">
                            En az 6 karakter, 1 harf ve 1 rakam
                        </div>
                    </div>

                    <div class="mb-3">
                        <label class="form-label">
                            <i class="bi bi-lock-fill"></i> Yeni Şifre Tekrar
                        </label>
                        <input type="password" class="form-control form-control-lg"
                               name="yeni_sifre2" required>
                    </div>

                    <div class="d-grid mt-4">
                        <button type="submit" class="btn btn-danger btn-lg">
                            <i class="bi bi-check-circle"></i> Şifremi Güncelle
                        </button>
                    </div>
                </form>

                <hr>
                <div class="text-center">
                    <a href="{{ url_for('auth.login_page') }}" class="text-muted">
                        <i class="bi bi-arrow-left"></i> Giriş sayfasına dön
                    </a>
                </div>
            </div>
        </div>

    </div>
</div>
{% endblock %}
