{% extends 'base.html' %}
{% block baslik %}Personel Girişi – Güzellik Merkezi{% endblock %}

{% block icerik %}
<div class="row justify-content-center mt-5">
    <div class="col-md-5">
        <div class="text-center mb-4">
            <i class="bi bi-person-badge-fill text-danger" style="font-size: 3rem;"></i>
            <h3 class="mt-2 fw-bold">Personel / Yönetici Girişi</h3>
            <p class="text-muted">Güzellik Merkezi Çalışan Paneli</p>
        </div>

        <div class="card shadow border-0">
            <div class="card-body p-4">
                <form method="POST" action="{{ url_for('auth.personel_login_page') }}">

                    <div class="mb-3">
                        <label for="email" class="form-label">
                            <i class="bi bi-envelope"></i> E-posta
                        </label>
                        <input type="email" class="form-control" id="email"
                               name="email" placeholder="personel@guzellikmerkezi.com" required>
                    </div>

                    <div class="mb-3">
                        <label for="sifre" class="form-label">
                            <i class="bi bi-lock"></i> Şifre
                        </label>
                        <input type="password" class="form-control" id="sifre"
                               name="sifre" required>
                    </div>

                    <div class="d-grid mt-4">
                        <button type="submit" class="btn btn-dark btn-lg">
                            <i class="bi bi-box-arrow-in-right"></i> Giriş Yap
                        </button>
                    </div>
                </form>

                <hr>
                <div class="text-center">
                    <a href="{{ url_for('auth.login_page') }}" class="text-muted small">
                        <i class="bi bi-arrow-left"></i> Müşteri Girişine Dön
                    </a>
                </div>

                <!-- Varsayılan admin bilgisi (sadece geliştirme aşamasında) -->
                <div class="alert alert-warning mt-3 small">
                    <i class="bi bi-exclamation-triangle"></i>
                    <strong>Geliştirici Notu:</strong><br>
                    Varsayılan Admin: <code>admin@guzellikmerkezi.com</code> / <code>admin123</code>
                </div>
            </div>
        </div>

    </div>
</div>
{% endblock %}
