{% extends 'base.html' %}
{% block baslik %}Şifre Değiştir{% endblock %}
{% block icerik %}

<div class="row justify-content-center">
    <div class="col-md-5">
        <div class="card shadow-sm">
            <div class="card-header bg-dark text-white">
                <h5 class="mb-0">
                    <i class="bi bi-shield-lock"></i> Şifre Değiştir
                </h5>
            </div>
            <div class="card-body p-4">
                <form method="POST" action="{{ url_for('personel.sifre_degistir') }}">

                    <div class="mb-3">
                        <label class="form-label">
                            <i class="bi bi-lock"></i> Mevcut Şifre
                        </label>
                        <input type="password" class="form-control"
                               name="mevcut_sifre" required autofocus>
                    </div>

                    <hr>

                    <div class="mb-3">
                        <label class="form-label">
                            <i class="bi bi-lock-fill"></i> Yeni Şifre
                        </label>
                        <input type="password" class="form-control"
                               name="yeni_sifre" minlength="6" required>
                        <div class="form-text">
                            En az 6 karakter, 1 harf ve 1 rakam
                        </div>
                    </div>

                    <div class="mb-3">
                        <label class="form-label">
                            <i class="bi bi-lock-fill"></i> Yeni Şifre Tekrar
                        </label>
                        <input type="password" class="form-control"
                               name="yeni_sifre2" required>
                    </div>

                    <div class="d-grid mt-4">
                        <button type="submit" class="btn btn-dark btn-lg">
                            <i class="bi bi-check-circle"></i> Şifremi Güncelle
                        </button>
                    </div>
                </form>

                <hr>
                <div class="text-center">
                    <a href="{{ url_for('personel.panel') }}" class="text-muted">
                        <i class="bi bi-arrow-left"></i> Panele Dön
                    </a>
                </div>
            </div>
        </div>
    </div>
</div>

{% endblock %}
